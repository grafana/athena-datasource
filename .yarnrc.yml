# Yarn supply-chain posture (aligned with Grafana security-hardening guidance).
# Do not add approvedGitRepositories — it expands execution trust (Yarn may suggest
# migrating with "**"; reject that and keep git deps disallowed).
# https://yarnpkg.com/configuration/yarnrc#approvedGitRepositories
nodeLinker: node-modules

yarnPath: .yarn/releases/yarn-4.16.0.cjs

enableImmutableInstalls: true
enableHardenedMode: true
defaultSemverRangePrefix: ''
enableScripts: false
checksumBehavior: throw
npmMinimalAgeGate: 4320 # 3 days in minutes

npmRegistryServer: 'https://registry.npmjs.org/'
unsafeHttpWhitelist: []

nmHoistingLimits: workspaces

npmPreapprovedPackages:
  - '@grafana/*'

# @grafana/plugin-ui expects peers from the consuming app; @grafana/aws-sdk bundles plugin-ui without re-declaring peers.
packageExtensions:
  '@grafana/aws-sdk@*':
    peerDependencies:
      '@grafana/data': '*'
      '@grafana/e2e-selectors': '*'
      '@grafana/runtime': '*'
      '@grafana/ui': '*'
      '@testing-library/jest-dom': '*'
      '@testing-library/react': '*'
      '@testing-library/user-event': '*'
      react: '*'
      react-dom: '*'
